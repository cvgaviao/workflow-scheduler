document:
  dsl: '1.0.3'
  namespace: matrisk_POC
  name: cron-schedule
  version: '0.1.0'
schedule:
  cron: 0 0 * * *
  
do:
  - emitEvent:
      emit:
        event:
          with:
            source: https://petstore.com
            type: com.petstore.order.placed.v1
            data:
              client:
                firstName: Cruella
                lastName: de Vil
              items:
                - breed: dalmatian
                  quantity: 101